version: 2

project_name: simrun-pack

builds:
  - id: simrun-pack
    binary: simrun-pack
    main: .
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.Version={{ .Version }}

archives:
  # Must match the resolver: <name>_<version>_<os>_<arch>.tar.gz, lowercase os/arch.
  - id: simrun-pack
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  # Resolver fetches this exact filename.
  name_template: checksums.txt

release:
  github:
    owner: confluentinc
    name: simrun-pack
